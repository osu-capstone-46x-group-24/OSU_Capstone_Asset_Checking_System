openapi: 3.0.0
info:
    title: API Documentation
    version: 1.0.0
    description: API documentation for your service
paths:
    /api/log/{level}:
        parameters:
            - name: level
              schema:
                  type: string
              in: path
              description: string
              required: true
        post:
            summary: Logs event to database with severity level.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Event"
                            example:
                                timestamp: YYYY-MM-DD
                                type: Scanner
                                message: we must construct more scanners.
                required: true
            responses:
                "200":
                    description: OK
    /api/items:
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Item"
            responses:
                "200":
                    description: "Item added to database"
                "501":
                    description: "Failed to add item"
    /api/items/all:
        get:
            responses:
                "200":
                    description: "List of all items"
                    content:
                        application/json:
                            schema:
                                type: "array"
                                items:
                                    $ref: "#/components/schemas/Item"
    /api/items/available:
        get:
            responses:
                "200":
                    description: "List of all available items"
                    content:
                        application/json:
                            schema:
                                type: "array"
                                items:
                                    $ref: "#/components/schemas/Item"
    /api/checkout:
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Checkout"
            responses:
                "200":
                    description: "Successful checkout"
                "404":
                    description: "An item was not available for checkout or the user doesn't exist. This cancels the request."
    /api/checkin:
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/Checkin"
            responses:
                "200":
                    description: "Successful checkin"
                "400":
                    description: "Item already checkedin"
