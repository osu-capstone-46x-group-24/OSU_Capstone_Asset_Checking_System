openapi: 3.0.0
info:
    title: API Documentation
    version: 1.0.0
    description: API documentation for your service
paths:
    /api/log/{level}:
        parameters:
            - name: level
              schema:
                  type: string
              in: path
              description: string
              required: true
        post:
            summary: Logs event to database with severity level.
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                timestamp:
                                    type: string
                                    format: date-time
                                type:
                                    type: string
                                message:
                                    type: string
                            example:
                                timestamp: YYYY-MM-DD
                                type: Scanner
                                message: we must construct more scanners.
                required: true
            responses:
                "200":
                    description: OK
    /api/items:
        post:
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                rfid:
                                    type: string
            responses:
                "200":
                    description: OK
            deprecated: false
    /api/items/all:
        get:
            responses:
                "200":
                    description: "List of all items"
